<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-pattern {
            background-image: radial-gradient(#c3c6d7 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md h-screen w-full flex items-center justify-center relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute inset-0 bg-pattern opacity-30 pointer-events-none z-0"></div>
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-fixed opacity-20 blur-3xl z-0"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-fixed opacity-20 blur-3xl z-0"></div>
<!-- Login Card Container -->
<main class="w-full max-w-md mx-margin-mobile md:mx-auto bg-surface-container-lowest rounded-xl shadow-[0_10px_15px_-3px_rgba(0,0,0,0.08),_0_4px_6px_-2px_rgba(0,0,0,0.03)] border border-outline-variant p-stack-lg relative z-10">
<!-- Brand Header -->
<div class="text-center mb-stack-lg">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-primary text-on-primary mb-stack-md">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">work</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-base">Welcome to BlueCollar</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Log in to manage your professional journey.</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-stack-md" method="POST">
<!-- Email Input -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-stack-sm" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-sm focus:ring-2 focus:ring-primary focus:border-primary placeholder-on-surface-variant transition-colors" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex items-center justify-between mb-stack-sm">
<label class="block font-label-sm text-label-sm text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface font-body-sm focus:ring-2 focus:ring-primary focus:border-primary placeholder-on-surface-variant transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Keep me signed in -->
<div class="flex items-center pt-base">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-surface-container-lowest" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                    Keep me signed in
                </label>
</div>
<!-- Submit Button -->
<div class="pt-stack-sm">
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-on-primary-fixed-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="submit">
                    Sign In
                </button>
</div>
</form>
<!-- Divider -->
<div class="mt-stack-lg mb-stack-md relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-container-lowest text-on-surface-variant font-label-sm text-label-sm uppercase tracking-wider">Or continue with</span>
</div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-stack-md mb-stack-lg">
<button class="flex items-center justify-center w-full px-4 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest hover:bg-surface-container-low focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="button">
<svg class="h-5 w-5 mr-2" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-label-sm text-label-sm text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center w-full px-4 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest hover:bg-surface-container-low focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="button">
<svg class="h-5 w-5 mr-2 text-[#0A66C2]" fill="currentColor" viewbox="0 0 24 24">
<path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"></path>
</svg>
<span class="font-label-sm text-label-sm text-on-surface">LinkedIn</span>
</button>
</div>
<!-- Sign Up Links -->
<div class="text-center rounded-lg bg-surface-container-low p-stack-md mt-stack-md">
<p class="font-body-sm text-body-sm text-on-surface-variant mb-base">Don't have an account?</p>
<div class="flex flex-col sm:flex-row items-center justify-center gap-2 sm:gap-4 mt-stack-sm">
<a class="font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant transition-colors flex items-center" href="#">
                    Sign up as a Worker <span class="material-symbols-outlined text-[16px] ml-1">arrow_forward</span>
</a>
<span class="hidden sm:inline text-outline-variant">|</span>
<a class="font-label-md text-label-md text-secondary hover:text-on-secondary-container transition-colors flex items-center" href="#">
                    Sign up as Employer <span class="material-symbols-outlined text-[16px] ml-1">arrow_forward</span>
</a>
</div>
</div>
</main>
<!-- Support Link Footer -->
<div class="absolute bottom-margin-mobile left-0 right-0 text-center z-10">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-on-surface transition-colors flex items-center justify-center" href="#">
<span class="material-symbols-outlined text-[18px] mr-1">help</span> Need help signing in?
        </a>
</div>
</body></html>
